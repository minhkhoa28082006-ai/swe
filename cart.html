<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Sweet Ping Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-page { padding: 40px 0; min-height: 60vh; }
        .cart-title { font-size: 2rem; font-weight: 800; margin-bottom: 30px; color: #831843; display: flex; align-items: center; gap: 12px; }
        .cart-container { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .cart-items { background: white; border-radius: 28px; padding: 24px; border: 1px solid #fce7f3; }
        .cart-header-row { display: grid; grid-template-columns: 80px 1fr 120px 140px 100px 60px; gap: 15px; padding: 15px 0; border-bottom: 2px solid #fce7f3; font-weight: 700; color: #be185d; }
        .cart-row { display: grid; grid-template-columns: 80px 1fr 120px 140px 100px 60px; gap: 15px; align-items: center; padding: 20px 0; border-bottom: 1px solid #fce7f3; }
        .cart-img { width: 70px; height: 70px; background: #fff0f5; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
        .cart-img img { width: 100%; height: 100%; object-fit: contain; }
        .cart-name { font-weight: 600; color: #4a044e; }
        .cart-price { font-weight: 700; color: #ec489a; }
        .cart-qty { display: flex; align-items: center; gap: 12px; }
        .cart-qty button { width: 32px; height: 32px; border: 1px solid #fbcfe8; background: white; border-radius: 10px; cursor: pointer; }
        .cart-subtotal { font-weight: 800; color: #831843; }
        .cart-remove { background: none; border: none; color: #ec489a; font-size: 1.2rem; cursor: pointer; }
        .cart-summary { background: white; border-radius: 28px; padding: 28px; border: 1px solid #fce7f3; position: sticky; top: 100px; }
        .summary-row { display: flex; justify-content: space-between; padding: 12px 0; }
        .summary-row.total { border-top: 2px solid #fce7f3; margin-top: 12px; padding-top: 20px; font-weight: 800; font-size: 1.2rem; }
        .summary-row.total span:last-child { color: #ec489a; font-size: 1.4rem; }
        .coupon-group { display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #fce7f3; }
        .coupon-group input { flex: 1; padding: 12px; border: 1px solid #fbcfe8; border-radius: 48px; }
        .coupon-group button { background: #fce7f3; border: none; padding: 12px 24px; border-radius: 48px; cursor: pointer; color: #be185d; }
        .checkout-btn { width: 100%; background: linear-gradient(135deg, #ec489a, #f472b6); color: white; border: none; padding: 16px; border-radius: 48px; font-weight: 700; margin-top: 20px; cursor: pointer; }
        .continue-btn { display: block; text-align: center; margin-top: 15px; color: #ec489a; text-decoration: none; }
        .empty-cart { text-align: center; padding: 80px; background: white; border-radius: 28px; }
        @media (max-width: 968px) {
            .cart-container { grid-template-columns: 1fr; }
            .cart-header-row { display: none; }
            .cart-row { grid-template-columns: 1fr; gap: 12px; text-align: center; }
            .cart-img { margin: 0 auto; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container">
        <span><i class="fas fa-heart"></i> Bánh ngọt tươi mỗi ngày</span>
        <span><i class="fas fa-truck-fast"></i> Miễn phí vận chuyển đơn từ 300k</span>
        <span><i class="fas fa-clock"></i> Săn Bánh Giờ Vàng</span>
    </div>
</div>

<div class="main-header">
    <div class="container header-content">
        <div class="logo"><a href="index.html"><h1>Sweet Ping Bakery</h1><p>Săn Bánh Giờ Vàng 🎯</p></a></div>
        <div class="search-bar"><input type="text" placeholder="Bạn muốn bánh gì hôm nay?" id="searchInput"><button id="searchBtn"><i class="fas fa-search"></i></button></div>
        <div class="cart-icon" onclick="location.href='cart.html'"><i class="fas fa-shopping-bag"></i><span>Giỏ hàng</span><span class="cart-count" id="cartCount">0</span></div>
    </div>
</div>

<div class="container cart-page">
    <div class="cart-title"><i class="fas fa-shopping-cart"></i> Giỏ hàng của bạn</div>
    <div id="cartContent"></div>
</div>

<footer>
    <div class="container">
        <p>© 2025 Sweet Ping Bakery - Săn Bánh Giờ Vàng</p>
    </div>
</footer>

<div id="toastMsg" class="toast-msg"></div>

<script src="js/cart.js"></script>
</body>
</html>
