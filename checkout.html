<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Thanh toán - Sweet Ping Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #fff5f7, #ffe4ec); color: #4a044e; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .top-bar { background: #831843; color: #fce7f3; padding: 10px 0; font-size: 0.8rem; }
        .top-bar .container { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .main-header { background: white; box-shadow: 0 4px 15px rgba(236,72,153,0.1); position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; padding: 15px 0; gap: 15px; }
        .logo h1 { font-family: 'Dancing Script', cursive; font-size: 1.8rem; background: linear-gradient(135deg, #f472b6, #ec489a); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 0.7rem; color: #ec489a; }
        .search-bar { flex: 1; max-width: 400px; display: flex; border: 2px solid #fbcfe8; border-radius: 50px; overflow: hidden; }
        .search-bar input { flex: 1; padding: 10px 18px; border: none; outline: none; }
        .search-bar button { background: #fdf2f8; border: none; padding: 0 20px; cursor: pointer; color: #ec489a; }
        .cart-icon { cursor: pointer; background: #fdf2f8; padding: 8px 18px; border-radius: 50px; display: flex; align-items: center; gap: 8px; border: 1px solid #fbcfe8; }
        .cart-count { background: #ec489a; color: white; border-radius: 30px; padding: 2px 8px; font-size: 0.7rem; }
        .checkout-page { padding: 40px 0; }
        .checkout-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 25px; color: #831843; display: flex; align-items: center; gap: 10px; }
        .checkout-container { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .form-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid #fce7f3; }
        .form-section h3 { color: #831843; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-size: 1.1rem; }
        .form-row { margin-bottom: 15px; }
        .form-row label { display: block; margin-bottom: 5px; color: #be185d; font-weight: 500; font-size: 0.8rem; }
        .form-row input, .form-row textarea { width: 100%; padding: 10px 14px; border: 1px solid #fbcfe8; border-radius: 12px; outline: none; }
        .form-row-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .payment-option { display: flex; align-items: center; gap: 12px; padding: 12px; border: 2px solid #fbcfe8; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }
        .payment-option.selected { border-color: #ec489a; background: #fff0f5; }
        .order-summary { background: white; border-radius: 20px; padding: 25px; border: 1px solid #fce7f3; position: sticky; top: 100px; }
        .order-summary h3 { color: #831843; margin-bottom: 15px; }
        .order-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #fce7f3; }
        .order-item-img { width: 50px; height: 50px; background: #fff0f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .order-item-img img { width: 100%; height: 100%; object-fit: contain; }
        .order-item-info { flex: 1; }
        .order-item-name { font-weight: 600; font-size: 0.85rem; }
        .order-item-price { color: #ec489a; font-weight: 600; font-size: 0.8rem; }
        .order-item-qty { font-size: 0.7rem; color: #be185d; }
        .order-item-total { font-weight: 700; color: #831843; font-size: 0.85rem; }
        .summary-line { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.9rem; }
        .summary-line.total { border-top: 2px solid #fce7f3; margin-top: 8px; padding-top: 12px; font-weight: 800; font-size: 1rem; }
        .summary-line.total span:last-child { color: #ec489a; font-size: 1.1rem; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #ec489a, #f472b6); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 700; margin-top: 20px; cursor: pointer; }
        .cart-actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .cart-actions button { padding: 6px 14px; border-radius: 30px; cursor: pointer; background: none; font-size: 0.75rem; }
        .clear-btn { border: 1px solid #ec489a; color: #ec489a; }
        .add-btn { border: 1px solid #831843; color: #831843; }
        footer { background: #831843; color: #fbcfe8; padding: 25px 0; text-align: center; margin-top: 40px; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #831843; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1100; opacity: 0; transition: 0.2s; }
        .toast-msg.show { opacity: 1; bottom: 30px; }
        @media (max-width: 768px) {
            .header-content { flex-direction: column; }
            .search-bar { max-width: 100%; width: 100%; }
            .checkout-container { grid-template-columns: 1fr; }
            .form-row-inline { grid-template-columns: 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container">
        <span><i class="fas fa-heart"></i> Bánh ngọt tươi mỗi ngày</span>
        <span><i class="fas fa-truck-fast"></i> Miễn phí vận chuyển đơn từ 300k</span>
        <span><i class="fas fa-clock"></i> Săn Bánh Giờ Vàng</span>
    </div>
</div>

<div class="main-header">
    <div class="container header-content">
        <div class="logo"><a href="index.html" style="text-decoration: none;"><h1>Sweet Ping Bakery</h1><p>Săn Bánh Giờ Vàng 🎯</p></a></div>
        <div class="search-bar"><input type="text" placeholder="Bạn muốn bánh gì?" id="searchInput"><button id="searchBtn"><i class="fas fa-search"></i></button></div>
        <div class="cart-icon" onclick="location.href='cart.html'"><i class="fas fa-shopping-bag"></i><span>Giỏ hàng</span><span class="cart-count" id="cartCount">0</span></div>
    </div>
</div>

<div class="container checkout-page">
    <div class="checkout-title"><i class="fas fa-credit-card"></i> Thanh toán đơn hàng</div>
    <div id="checkoutContent"></div>
</div>

<footer><div class="container"><p>© 2025 Sweet Ping Bakery - Săn Bánh Giờ Vàng</p></div></footer>
<div id="toastMsg" class="toast-msg"></div>

<script>
let cart = [];
let coupon = null;
let payment = 'cod';

function loadCart() {
    let stored = localStorage.getItem("sweetping_cart");
    if (stored) cart = JSON.parse(stored);
    let savedCoupon = localStorage.getItem("sweetping_coupon");
    if (savedCoupon) coupon = JSON.parse(savedCoupon);
    updateCartCount();
    renderCheckout();
}

function saveCart() {
    localStorage.setItem("sweetping_cart", JSON.stringify(cart));
    updateCartCount();
    renderCheckout();
}

function updateCartCount() {
    let span = document.getElementById('cartCount');
    if (span) span.innerText = cart.reduce((s, i) => s + i.quantity, 0);
}

function formatPrice(p) {
    return p.toLocaleString('vi-VN') + '₫';
}

function updateQty(id, delta) {
    let idx = cart.findIndex(i => i.id === id);
    if (idx !== -1) {
        let newQty = cart[idx].quantity + delta;
        if (newQty <= 0) cart.splice(idx, 1);
        else cart[idx].quantity = newQty;
        saveCart();
        showToast(newQty <= 0 ? "🗑 Đã xóa" : "🔄 Đã cập nhật");
    }
}

function removeItem(id) {
    cart = cart.filter(i => i.id !== id);
    saveCart();
    showToast("🗑 Đã xóa");
}

function clearCart() {
    if (cart.length === 0) return;
    if (confirm("Xóa tất cả?")) { cart = []; saveCart(); showToast("🗑 Đã xóa"); }
}

function calcTotal() {
    let subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
    let discount = 0;
    if (coupon) { if (coupon.type === 'percent') discount = subtotal * coupon.value / 100; else discount = coupon.value; discount = Math.min(discount, subtotal); }
    let shipping = subtotal > 0 ? (subtotal >= 300000 ? 0 : 30000) : 0;
    return { subtotal, discount, shipping, total: subtotal - discount + shipping };
}

function selectPayment(method) { payment = method; renderCheckout(); }

function submitOrder() {
    if (cart.length === 0) { showToast("🛍 Giỏ hàng trống!"); return; }
    let name = document.getElementById('fullName')?.value.trim();
    let phone = document.getElementById('phone')?.value.trim();
    let email = document.getElementById('email')?.value.trim();
    let address = document.getElementById('address')?.value.trim();
    let city = document.getElementById('city')?.value.trim();
    let district = document.getElementById('district')?.value.trim();
    if (!name || !phone || !email || !address || !city || !district) { showToast("⚠️ Vui lòng điền đầy đủ thông tin!"); return; }
    if (!/^[0-9]{10,11}$/.test(phone)) { showToast("📞 Số điện thoại không hợp lệ!"); return; }
    let { total } = calcTotal();
    alert(`🎉 ĐẶT HÀNG THÀNH CÔNG!\n\n👤 ${name}\n📍 ${address}, ${district}, ${city}\n📞 ${phone}\n💰 ${formatPrice(total)}\n\nCảm ơn bạn đã mua hàng!`);
    cart = []; localStorage.removeItem("sweetping_cart"); localStorage.removeItem("sweetping_coupon"); location.href = 'index.html';
}

function renderCheckout() {
    let container = document.getElementById('checkoutContent');
    if (!container) return;
    if (cart.length === 0) { container.innerHTML = `<div style="text-align:center;padding:60px;background:white;border-radius:20px;"><i class="fas fa-shopping-cart" style="font-size:4rem;color:#fbcfe8;"></i><h3>🍰 Giỏ hàng trống</h3><a href="index.html" class="submit-btn" style="display:inline-block;width:auto;padding:12px 30px;">Mua sắm ngay</a></div>`; return; }
    let { subtotal, discount, shipping, total } = calcTotal();
    let itemsHtml = '';
    cart.forEach(item => { itemsHtml += `<div class="order-item"><div class="order-item-img"><img src="${item.icon}" onerror="this.src='https://placehold.co/50x50/ffe4ec/ec489a?text=Cake'"></div><div class="order-item-info"><div class="order-item-name">${item.name}</div><div class="order-item-price">${formatPrice(item.price)}</div><div class="order-item-qty">x${item.quantity}</div></div><div class="order-item-total">${formatPrice(item.price * item.quantity)}</div><button onclick="removeItem(${item.id})" style="background:none;border:none;color:#ec489a;cursor:pointer;"><i class="fas fa-trash-alt"></i></button></div>`; });
    container.innerHTML = `<div class="checkout-container"><div><div class="form-section"><h3><i class="fas fa-user"></i> Thông tin nhận hàng</h3><div class="form-row-inline"><div class="form-row"><label>Họ tên *</label><input type="text" id="fullName" placeholder="Nhập họ tên"></div><div class="form-row"><label>Số điện thoại *</label><input type="tel" id="phone" placeholder="Nhập số điện thoại"></div></div><div class="form-row"><label>Email *</label><input type="email" id="email" placeholder="example@email.com"></div></div><div class="form-section"><h3><i class="fas fa-map-marker-alt"></i> Địa chỉ giao hàng</h3><div class="form-row"><label>Địa chỉ *</label><input type="text" id="address" placeholder="Số nhà, tên đường"></div><div class="form-row-inline"><div class="form-row"><label>Thành phố *</label><input type="text" id="city" placeholder="Thành phố"></div><div class="form-row"><label>Quận/Huyện *</label><input type="text" id="district" placeholder="Quận/Huyện"></div></div><div class="form-row"><label>Ghi chú</label><textarea id="note" rows="2" placeholder="Ghi chú..."></textarea></div></div><div class="form-section"><h3><i class="fas fa-wallet"></i> Phương thức thanh toán</h3><div class="payment-option ${payment === 'cod' ? 'selected' : ''}" onclick="selectPayment('cod')"><input type="radio" ${payment === 'cod' ? 'checked' : ''}> <span>💰 Thanh toán khi nhận hàng (COD)</span></div><div class="payment-option ${payment === 'bank' ? 'selected' : ''}" onclick="selectPayment('bank')"><input type="radio" ${payment === 'bank' ? 'checked' : ''}> <span>🏦 Chuyển khoản ngân hàng</span></div></div></div><div class="order-summary"><h3><i class="fas fa-receipt"></i> Đơn hàng</h3><div class="cart-actions"><button class="clear-btn" onclick="clearCart()"><i class="fas fa-trash-alt"></i> Xóa tất cả</button><button class="add-btn" onclick="location.href='index.html'"><i class="fas fa-plus"></i> Thêm sản phẩm</button></div><div style="max-height:300px;overflow-y:auto;">${itemsHtml}</div><div class="summary-line"><span>Tạm tính:</span><span>${formatPrice(subtotal)}</span></div>${coupon ? `<div class="summary-line" style="color:#10b981;"><span>Giảm giá (${coupon.name}):</span><span>- ${formatPrice(discount)}</span></div>` : ''}<div class="summary-line"><span>Phí vận chuyển:</span><span>${shipping === 0 ? 'Miễn phí' : formatPrice(shipping)}</span></div><div class="summary-line total"><span>Tổng cộng:</span><span>${formatPrice(total)}</span></div><button class="submit-btn" onclick="submitOrder()"><i class="fas fa-check-circle"></i> ĐẶT HÀNG NGAY</button><a href="cart.html" style="display:block;text-align:center;margin-top:12px;color:#ec489a;">← Quay lại giỏ hàng</a></div></div>`;
}

let toastTimeout;
function showToast(msg) { let toast = document.getElementById('toastMsg'); toast.innerText = msg; toast.classList.add('show'); clearTimeout(toastTimeout); toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000); }

function handleSearch() { let kw = document.getElementById('searchInput').value; if (kw.trim()) localStorage.setItem('searchKw', kw); location.href = 'index.html'; }

document.addEventListener('DOMContentLoaded', () => { loadCart(); document.getElementById('searchBtn').onclick = handleSearch; document.getElementById('searchInput').onkeyup = e => e.key === 'Enter' && handleSearch(); });
</script>
</body>
</html>
